<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f3d"/>
      <stop offset="100%" style="stop-color:#0a1528"/>
    </linearGradient>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fa3f7"/>
      <stop offset="100%" style="stop-color:#1a6fd4"/>
    </linearGradient>
    <linearGradient id="speedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fa3f7;stop-opacity:0"/>
      <stop offset="60%" style="stop-color:#4fa3f7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#4fa3f7;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="roundedClip">
      <rect width="100" height="100" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture -->
  <g clip-path="url(#roundedClip)" opacity="0.06">
    <line x1="0" y1="25" x2="100" y2="25" stroke="#4fa3f7" stroke-width="0.5"/>
    <line x1="0" y1="50" x2="100" y2="50" stroke="#4fa3f7" stroke-width="0.5"/>
    <line x1="0" y1="75" x2="100" y2="75" stroke="#4fa3f7" stroke-width="0.5"/>
    <line x1="25" y1="0" x2="25" y2="100" stroke="#4fa3f7" stroke-width="0.5"/>
    <line x1="50" y1="0" x2="50" y2="100" stroke="#4fa3f7" stroke-width="0.5"/>
    <line x1="75" y1="0" x2="75" y2="100" stroke="#4fa3f7" stroke-width="0.5"/>
  </g>

  <!-- Speed lines -->
  <rect x="8" y="51" width="38" height="2" rx="1" fill="url(#speedGrad)" opacity="0.7"/>
  <rect x="5" y="56" width="28" height="1.5" rx="0.75" fill="url(#speedGrad)" opacity="0.45"/>
  <rect x="10" y="46" width="22" height="1.5" rx="0.75" fill="url(#speedGrad)" opacity="0.35"/>

  <!-- Car body platform -->
  <rect x="12" y="53" width="76" height="16" rx="3" fill="url(#carGrad)"/>

  <!-- Cabin roofline -->
  <path d="M28 53 L34 33 Q36 30 40 30 L65 30 Q68 30 70 33 L76 53 Z" fill="#3b8eea"/>

  <!-- Windshield dark glass -->
  <path d="M37 51 L41 35 Q42 33 44 33 L61 33 Q63 33 64 35 L68 51 Z" fill="#0a1f3f" opacity="0.85"/>

  <!-- Glass glare -->
  <path d="M39 49 L42 37 Q43 35.5 44.5 35.5 L50 35.5 L47 49 Z" fill="white" opacity="0.08"/>

  <!-- Body crease line -->
  <line x1="14" y1="57" x2="86" y2="57" stroke="#6ab8ff" stroke-width="0.8" opacity="0.5"/>

  <!-- Front bumper -->
  <rect x="12" y="63" width="18" height="6" rx="2" fill="#1557a9"/>
  <!-- Rear bumper -->
  <rect x="70" y="63" width="18" height="6" rx="2" fill="#1557a9"/>

  <!-- Headlight DRL -->
  <rect x="13" y="55" width="10" height="4" rx="1.5" fill="#fffbe6" opacity="0.95"/>
  <rect x="13" y="55" width="4" height="4" rx="1" fill="white"/>

  <!-- Tail light -->
  <rect x="77" y="55" width="10" height="4" rx="1.5" fill="#ff4c4c" opacity="0.9"/>
  <rect x="83" y="55" width="4" height="4" rx="1" fill="#ff2222"/>

  <!-- Front wheel -->
  <circle cx="28" cy="71" r="10" fill="#0d1f3c"/>
  <circle cx="28" cy="71" r="7.5" fill="#162a4e"/>
  <circle cx="28" cy="71" r="4.5" fill="#1d3566"/>
  <line x1="28" y1="64" x2="28" y2="78" stroke="#4fa3f7" stroke-width="1" opacity="0.5"/>
  <line x1="21.5" y1="67.5" x2="34.5" y2="74.5" stroke="#4fa3f7" stroke-width="1" opacity="0.5"/>
  <line x1="21.5" y1="74.5" x2="34.5" y2="67.5" stroke="#4fa3f7" stroke-width="1" opacity="0.5"/>
  <circle cx="28" cy="71" r="2" fill="#4fa3f7"/>

  <!-- Rear wheel -->
  <circle cx="72" cy="71" r="10" fill="#0d1f3c"/>
  <circle cx="72" cy="71" r="7.5" fill="#162a4e"/>
  <circle cx="72" cy="71" r="4.5" fill="#1d3566"/>
  <line x1="72" y1="64" x2="72" y2="78" stroke="#4fa3f7" stroke-width="1" opacity="0.5"/>
  <line x1="65.5" y1="67.5" x2="78.5" y2="74.5" stroke="#4fa3f7" stroke-width="1" opacity="0.5"/>
  <line x1="65.5" y1="74.5" x2="78.5" y2="67.5" stroke="#4fa3f7" stroke-width="1" opacity="0.5"/>
  <circle cx="72" cy="71" r="2" fill="#4fa3f7"/>

  <!-- Ground shadow -->
  <ellipse cx="50" cy="82" rx="38" ry="2.5" fill="#000" opacity="0.25"/>

  <!-- Blue accent strip at bottom -->
  <rect x="0" y="94" width="100" height="6" rx="0" fill="#1a6fd4" opacity="0.9"/>

  <!-- Top accent dots (premium detail) -->
  <circle cx="12" cy="12" r="3" fill="#4fa3f7" opacity="0.6"/>
  <circle cx="20" cy="12" r="3" fill="#4fa3f7" opacity="0.35"/>
  <circle cx="28" cy="12" r="3" fill="#4fa3f7" opacity="0.15"/>
</svg>